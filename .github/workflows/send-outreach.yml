name: 定时发开发信和跟进（夜间批次）
on:
  schedule:
    # 每天北京时间 00:00 / 02:00 / 04:00 / 06:00 / 08:00
    # 对应 UTC 16:00 / 18:00 / 20:00 / 22:00 / 00:00
    - cron: "0 0,16,18,20,22 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
      email:
        description: "Target email"
        required: false
      creator:
        description: "TikTok creator name"
        required: false
jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            google-generativeai
      - name: 发开发信和跟进信
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GMAIL_PASS_1:      ${{ secrets.GMAIL_PASS_1 }}
          GMAIL_PASS_2:      ${{ secrets.GMAIL_PASS_2 }}
          GMAIL_PASS_3:      ${{ secrets.GMAIL_PASS_3 }}
          GMAIL_PASS_4:      ${{ secrets.GMAIL_PASS_4 }}
          MAX_OUTREACH_PER_RUN: "50"
          MAX_FOLLOWUPS_PER_RUN: "50"
          MAX_CONSECUTIVE_FAILURES_PER_ACCOUNT: "3"
        run: python send_outreach.py
