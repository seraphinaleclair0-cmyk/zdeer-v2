name: 一次性补全历史达人回复

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "开始日期 YYYY-MM-DD；不填则默认扫描最近3天"
        required: false
        default: ""
      end_date:
        description: "结束日期 YYYY-MM-DD；不填则默认到今天"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            anthropic

      - name: 补全指定日期范围内的达人回复
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_TOKEN_JSON_1: ${{ secrets.GOOGLE_TOKEN_JSON_1 }}
          GOOGLE_TOKEN_JSON_2: ${{ secrets.GOOGLE_TOKEN_JSON_2 }}
          GOOGLE_TOKEN_JSON_3: ${{ secrets.GOOGLE_TOKEN_JSON_3 }}
          GOOGLE_TOKEN_JSON_4: ${{ secrets.GOOGLE_TOKEN_JSON_4 }}
          GMAIL_PASS_1: ${{ secrets.GMAIL_PASS_1 }}
          GMAIL_PASS_2: ${{ secrets.GMAIL_PASS_2 }}
          GMAIL_PASS_3: ${{ secrets.GMAIL_PASS_3 }}
          GMAIL_PASS_4: ${{ secrets.GMAIL_PASS_4 }}
          BACKFILL_START_DATE: ${{ inputs.start_date }}
          BACKFILL_END_DATE: ${{ inputs.end_date }}
          CLAUDE_MODEL: claude-haiku-4-5
        run: python backfill_replies.py

      - name: 同步待发名单已回复状态
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python sync_outbox_replied.py
