name: 手动发送已勾选回复
on:
  workflow_dispatch:  # 只手动触发，打了✅后来这里点
jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            google-generativeai
      - name: 发送沟通管理中打勾的回复
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GMAIL_PASS_1:      ${{ secrets.GMAIL_PASS_1 }}
          GMAIL_PASS_2:      ${{ secrets.GMAIL_PASS_2 }}
          GMAIL_PASS_3:      ${{ secrets.GMAIL_PASS_3 }}
          GMAIL_PASS_4:      ${{ secrets.GMAIL_PASS_4 }}
        run: python send_replies.py
