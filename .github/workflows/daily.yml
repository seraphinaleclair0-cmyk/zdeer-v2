name: Zdeer 每日自动运行
on:
  workflow_dispatch:  # 只允许手动触发测试，定时任务由 send-outreach/fetch-replies 分开执行
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            google-generativeai
      - name: 运行主程序
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON:  ${{ secrets.GOOGLE_TOKEN_JSON }}
          GMAIL_PASS_1:       ${{ secrets.GMAIL_PASS_1 }}
          GMAIL_PASS_2:       ${{ secrets.GMAIL_PASS_2 }}
          GMAIL_PASS_3:       ${{ secrets.GMAIL_PASS_3 }}
          GMAIL_PASS_4:       ${{ secrets.GMAIL_PASS_4 }}
          MAX_OUTREACH_PER_RUN: "40"
          MAX_CONSECUTIVE_FAILURES_PER_ACCOUNT: "3"
        run: python main.py
