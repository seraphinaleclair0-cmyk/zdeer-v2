name: Zdeer 每日自动运行
on:
  schedule:
    # 每天 3 次：北京时间 08:00 / 12:00 / 17:00
    - cron: "0 0,4,9 * * *"
  workflow_dispatch:  # 允许手动触发测试
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            google-generativeai
      - name: 运行主程序
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON:  ${{ secrets.GOOGLE_TOKEN_JSON }}
          GMAIL_PASS_1:       ${{ secrets.GMAIL_PASS_1 }}
          GMAIL_PASS_2:       ${{ secrets.GMAIL_PASS_2 }}
          GMAIL_PASS_3:       ${{ secrets.GMAIL_PASS_3 }}
          GMAIL_PASS_4:       ${{ secrets.GMAIL_PASS_4 }}
        run: python main.py
