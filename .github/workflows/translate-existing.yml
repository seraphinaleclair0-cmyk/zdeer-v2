name: 手动重建历史未回复邮件（谨慎）
on:
  workflow_dispatch:
jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            google-generativeai
      - name: 抓取历史未回复邮件并重建沟通管理
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python translate_existing.py
